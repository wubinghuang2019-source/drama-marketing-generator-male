<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>男性向剧集营销方案生成器 | 2025专业版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0E61AC 0%, #0a4a8a 35%, #083d73 70%, #06305c 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #FAF2E0;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(250, 242, 224, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(250, 242, 224, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(250, 242, 224, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }

        .header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(14, 97, 172, 0.4) 0%, rgba(10, 74, 138, 0.5) 100%);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 2px solid rgba(250, 242, 224, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 60px rgba(250, 242, 224, 0.1);
        }

        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            filter: drop-shadow(0 0 20px rgba(250, 242, 224, 0.6)) drop-shadow(0 0 40px rgba(250, 242, 224, 0.3));
            animation: logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(250, 242, 224, 0.6)) drop-shadow(0 0 40px rgba(250, 242, 224, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 30px rgba(250, 242, 224, 0.8)) drop-shadow(0 0 60px rgba(250, 242, 224, 0.5));
            }
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #FAF2E0 0%, #f5e8c8 50%, #e8d9b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            font-weight: 700;
            filter: drop-shadow(0 2px 10px rgba(250, 242, 224, 0.3));
        }

        .subtitle {
            color: #e8dcc0;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #FAF2E0 0%, #f0e5cd 100%);
            color: #0E61AC;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 700;
            margin: 5px;
            box-shadow: 0 4px 15px rgba(250, 242, 224, 0.4);
        }

        .hot-topics {
            background: linear-gradient(135deg, rgba(14, 97, 172, 0.3) 0%, rgba(10, 74, 138, 0.4) 100%);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 2px solid rgba(250, 242, 224, 0.25);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .hot-topics h3 {
            color: #FAF2E0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 20px rgba(250, 242, 224, 0.6);
            font-weight: 700;
        }

        .topic-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .topic-tab {
            padding: 8px 16px;
            background: rgba(250, 242, 224, 0.1);
            border: 1px solid rgba(250, 242, 224, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
            color: #FAF2E0;
        }

        .topic-tab.active {
            background: linear-gradient(135deg, rgba(250, 242, 224, 0.25) 0%, rgba(245, 232, 200, 0.3) 100%);
            border-color: #FAF2E0;
            box-shadow: 0 0 20px rgba(250, 242, 224, 0.4);
            color: #FAF2E0;
            font-weight: 600;
        }

        .topic-tab:hover {
            background: rgba(250, 242, 224, 0.2);
            border-color: #FAF2E0;
        }

        .topic-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .topic-item {
            background: linear-gradient(135deg, rgba(10, 74, 138, 0.4) 0%, rgba(8, 61, 115, 0.5) 100%);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9em;
            border-left: 3px solid #FAF2E0;
            cursor: pointer;
            transition: all 0.3s;
            color: #FAF2E0;
        }

        .topic-item:hover {
            background: linear-gradient(135deg, rgba(14, 97, 172, 0.6) 0%, rgba(10, 74, 138, 0.7) 100%);
            transform: translateX(5px);
            box-shadow: 0 4px 20px rgba(250, 242, 224, 0.2);
            border-left-color: #f5e8c8;
        }

        .topic-item .rank {
            color: #FAF2E0;
            font-weight: 700;
            margin-right: 8px;
        }

        .main-card {
            background: linear-gradient(135deg, rgba(14, 97, 172, 0.3) 0%, rgba(10, 74, 138, 0.4) 100%);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(250, 242, 224, 0.25);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 1.5em;
            color: #FAF2E0;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(250, 242, 224, 0.5);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group label {
            display: block;
            color: #e8dcc0;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95em;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(8, 61, 115, 0.4);
            border: 2px solid rgba(250, 242, 224, 0.2);
            border-radius: 12px;
            color: #FAF2E0;
            font-size: 1em;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #FAF2E0;
            background: rgba(10, 74, 138, 0.6);
            box-shadow: 0 0 0 3px rgba(250, 242, 224, 0.15);
        }

        .form-group select option {
            background: #083d73;
            color: #FAF2E0;
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #FAF2E0 0%, #f0e5cd 50%, #e8d9b0 100%);
            border: none;
            border-radius: 14px;
            color: #0E61AC;
            font-size: 1.15em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(250, 242, 224, 0.4);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(250, 242, 224, 0.6);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 60px 40px;
            background: rgba(22, 33, 62, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(14, 165, 233, 0.2);
        }

        .spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(14, 165, 233, 0.2);
            border-top-color: #0ea5e9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #resultSection {
            display: none;
            background: rgba(22, 33, 62, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(14, 165, 233, 0.2);
        }

        #resultContent { line-height: 1.8; }

        #resultContent h2 { color: #0ea5e9; margin-top: 30px; margin-bottom: 15px; border-bottom: 2px solid rgba(14, 165, 233, 0.3); padding-bottom: 10px; }
        #resultContent h3 { color: #ef4444; margin-top: 25px; margin-bottom: 12px; }
        #resultContent h4 { color: #94a3b8; margin-top: 20px; margin-bottom: 10px; }
        #resultContent p { margin-bottom: 12px; color: #cbd5e1; }
        #resultContent ul, #resultContent ol { margin-left: 25px; margin-bottom: 15px; }
        #resultContent li { margin-bottom: 8px; color: #cbd5e1; }
        #resultContent strong { color: #0ea5e9; }
        #resultContent .highlight-box {
            background: rgba(14, 165, 233, 0.1);
            border-left: 4px solid #0ea5e9;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
        }

        .action-buttons {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            padding-top: 25px;
            border-top: 1px solid rgba(14, 165, 233, 0.2);
        }

        .action-btn {
            flex: 1;
            min-width: 150px;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #3b82f6 100%);
            color: white;
            border: none;
        }

        .btn-secondary {
            background: transparent;
            color: #0ea5e9;
            border: 2px solid #0ea5e9;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
        }

        .btn-secondary:hover {
            background: rgba(14, 165, 233, 0.1);
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: #64748b;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .form-grid { grid-template-columns: 1fr; }
            .topic-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">

        // 显示结果
        function displayResult(content) {
            document.getElementById('resultContent').innerHTML = 
                content.split('\n').map(line => {
                    if (line.startsWith('# ')) return `<h2>${line.substring(2)}</h2>`;
                    if (line.startsWith('## ')) return `<h3>${line.substring(3)}</h3>`;
                    if (line.startsWith('### ')) return `<h4>${line.substring(4)}</h4>`;
                    if (line.startsWith('#### ')) return `<h4>${line.substring(5)}</h4>`;
                    if (line.startsWith('- ')) return `<li>${line.substring(2)}</li>`;
                    if (line.trim() === '---') return '<hr style="border: 1px solid rgba(14, 165, 233, 0.2); margin: 30px 0;">';
                    if (line.startsWith('**') && line.endsWith('**')) {
                        const text = line.substring(2, line.length - 2);
                        return `<p><strong>${text}</strong></p>`;
                    }
                    return line.trim() ? `<p>${line}</p>` : '';
                }).join('');
            
            window.currentMarkdown = content;
        }

        // 复制功能
        function copyToClipboard() {
            if (!window.currentMarkdown) {
                alert('没有可复制的内容');
                return;
            }
            navigator.clipboard.writeText(window.currentMarkdown).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✅ 已复制';
                setTimeout(() => { btn.textContent = originalText; }, 2000);
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        }

        // 下载Markdown
        function downloadMarkdown() {
            if (!window.currentMarkdown) {
                alert('没有可下载的内容');
                return;
            }
            const blob = new Blob([window.currentMarkdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${document.getElementById('dramaName').value || '营销方案'}_${Date.now()}.md`;
            a.click();
            URL.revokeObjectURL(url);
        }
